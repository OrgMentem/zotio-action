name: Self-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: Run the action against a real library
    runs-on: ubuntu-latest
    steps:
      - name: Check out the action
        uses: actions/checkout@v4

      - name: Gate Zotero bibliography via local action
        id: health
        uses: ./
        with:
          api-key: ${{ secrets.ZOTERO_API_KEY }}
          for: citation
          fail-on: critical
          check-retractions: "true"
          extra-args: "--limit 40"
          badge-path: badge.json

      - name: Show badge JSON and outputs
        if: always()
        run: |
          cat badge.json || echo "no badge written"
          echo "outputs: exit-code=${{ steps.health.outputs.exit-code }} message='${{ steps.health.outputs.message }}' color=${{ steps.health.outputs.color }}"
          if [ -z "${{ steps.health.outputs.message }}" ]; then
            echo "expected a non-empty message output" >&2
            exit 1
          fi

  missing-key:
    name: Fails fast without api-key
    runs-on: ubuntu-latest
    steps:
      - name: Check out the action
        uses: actions/checkout@v4

      - name: Run without api-key (must fail with exit 9)
        id: nokey
        uses: ./
        continue-on-error: true

      - name: Assert it failed
        run: |
          if [ "${{ steps.nokey.outcome }}" != "failure" ]; then
            echo "expected the action to fail without api-key" >&2
            exit 1
          fi
          echo "correctly refused to run without api-key"
